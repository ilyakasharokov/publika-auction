{{define "title"}}Clients{{end}}
{{define "content"}}
<h2>Clients ({{len .Clients}})</h2>
<input type="search" placeholder="Search by phone or name..."
  oninput="filterRows(this.value)" style="margin-bottom:1rem">

<table id="clients-table">
  <thead><tr>
    <th>Name</th><th>Phone</th><th>Telegram</th><th>Status</th><th></th>
  </tr></thead>
  <tbody>
  {{range .Clients}}
  <tr>
    <td>{{.Name}} {{.TgFirstName}} {{.TgLastName}}</td>
    <td><a href="/admin/clients/{{.Phone}}">{{.Phone}}</a></td>
    <td>{{if .TgUsername}}@{{.TgUsername}}{{end}}</td>
    <td>{{if .IsBlocked}}<span class="badge-ended">Blocked</span>{{else}}<span class="badge-active">Active</span>{{end}}</td>
    <td><a href="/admin/clients/{{.Phone}}">Open →</a></td>
  </tr>
  {{end}}
  </tbody>
</table>

<script>
function filterRows(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#clients-table tbody tr').forEach(function(tr) {
    tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
</script>
{{end}}
