{{define "title"}}New Auction{{end}}
{{define "content"}}
<h2>Create auction</h2>
{{if .Error}}<p style="color:red">{{.Error}}</p>{{end}}
<form method="post" action="/admin/auctions">
  <label>Slug (URL identifier, latin only)<input type="text" name="slug" required placeholder="spring-2025"></label>
  <label>Title<input type="text" name="title" required placeholder="Spring Auction 2025"></label>
  <label>Description<textarea name="description" rows="3"></textarea></label>
  <label>Minimum bid step (₽)<input type="number" name="bid_step" value="2000" min="100" required></label>
  <button type="submit">Create</button>
  <a href="/admin/auctions" role="button" class="secondary">Cancel</a>
</form>
{{end}}
