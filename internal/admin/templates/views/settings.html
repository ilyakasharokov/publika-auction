{{define "title"}}Bot Settings{{end}}
{{define "content"}}
<h2>Telegram Bot</h2>

<div style="margin-bottom:2rem">
  {{if .Status.Connected}}
  <p>
    <span style="display:inline-flex;align-items:center;gap:.5rem">
      <span style="width:10px;height:10px;border-radius:50%;background:#2ecc71;display:inline-block"></span>
      <strong>Connected</strong> as @{{.Status.Username}}
    </span>
  </p>
  <form method="post" action="/admin/settings/disconnect">
    <button class="secondary outline">Disconnect</button>
  </form>
  {{else}}
  <p>
    <span style="display:inline-flex;align-items:center;gap:.5rem">
      <span style="width:10px;height:10px;border-radius:50%;background:#e74c3c;display:inline-block"></span>
      <strong>Disconnected</strong>
    </span>
  </p>
  {{end}}
</div>

{{if .Error}}<p style="color:red">{{.Error}}</p>{{end}}

<article style="max-width:500px">
  <h3>{{if .Status.Connected}}Reconnect{{else}}Connect bot{{end}}</h3>
  <form method="post" action="/admin/settings/connect">
    <label>
      Bot Token
      <input type="password" name="token"
        value="{{.Status.Token}}"
        placeholder="123456789:AABBccdd..."
        required autocomplete="off">
      <small>Get a token from <a href="https://t.me/BotFather" target="_blank">@BotFather</a></small>
    </label>
    <label>
      API Endpoint
      <input type="text" name="endpoint"
        value="{{.Status.Endpoint}}"
        placeholder="https://api.telegram.org/bot%s/%s">
      <small>Leave default unless you use a local Telegram Bot API server</small>
    </label>
    <button type="submit">{{if .Status.Connected}}Reconnect{{else}}Connect{{end}}</button>
  </form>
</article>
{{end}}
