{{define "title"}}Настройки бота{{end}}
{{define "content"}}
<h2>Telegram Bot</h2>

<div style="margin-bottom:2rem">
  {{if .Status.Connected}}
  <p>
    <span style="display:inline-flex;align-items:center;gap:.5rem">
      <span style="width:10px;height:10px;border-radius:50%;background:#2ecc71;display:inline-block"></span>
      <strong>Подключён</strong> как @{{.Status.Username}}
    </span>
  </p>
  <form method="post" action="/admin/settings/disconnect">
    <button class="secondary outline">Отключить бота</button>
  </form>
  {{else}}
  <p>
    <span style="display:inline-flex;align-items:center;gap:.5rem">
      <span style="width:10px;height:10px;border-radius:50%;background:#e74c3c;display:inline-block"></span>
      <strong>Не подключён</strong>
    </span>
  </p>
  {{end}}
</div>

{{if .Error}}<p style="color:red">{{.Error}}</p>{{end}}

<article style="max-width:500px">
  <h3>{{if .Status.Connected}}Переподключить бота{{else}}Подключить бота{{end}}</h3>
  <form method="post" action="/admin/settings/connect">
    <label>
      Bot Token
      <input type="password" name="token"
        value="{{.Status.Token}}"
        placeholder="123456789:AABBccdd..."
        required autocomplete="off">
      <small>Получите токен у <a href="https://t.me/BotFather" target="_blank">@BotFather</a></small>
    </label>
    <label>
      API Endpoint
      <input type="text" name="endpoint"
        value="{{.Status.Endpoint}}"
        placeholder="https://api.telegram.org/bot%s/%s">
      <small>Оставьте стандартным если не используете локальный сервер Telegram</small>
    </label>
    <button type="submit">{{if .Status.Connected}}Переподключить{{else}}Подключить{{end}}</button>
  </form>
</article>
{{end}}
