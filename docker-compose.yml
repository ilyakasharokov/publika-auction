version: '3.9'

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  telegram-bot-api:
    image: ghcr.io/bots-house/docker-telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    volumes:
      - telegram_api_data:/var/lib/telegram-bot-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    environment:
      PUBLIKA_AUCTION_BOT_ADDR: :8002
      PUBLIKA_AUCTION_BOT_MONGO_URI: mongodb://mongo:27017
      PUBLIKA_AUCTION_BOT_MONGO_DB: auction
      PUBLIKA_AUCTION_BOT_REDIS_ADDR: redis:6379
      PUBLIKA_AUCTION_BOT_TG_ENDPOINT: http://telegram-bot-api:8081/bot%s/%s
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      telegram-bot-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
  uploads_data:
  telegram_api_data:
