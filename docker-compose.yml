version: '3.9'

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      PUBLIKA_AUCTION_BOT_ADDR: :8002
      PUBLIKA_AUCTION_BOT_MONGO_URI: mongodb://mongo:27017
      PUBLIKA_AUCTION_BOT_MONGO_DB: auction
      PUBLIKA_AUCTION_BOT_REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
